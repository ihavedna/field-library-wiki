site_name: Citadel Wiki
site_description: A wiki for the Citadel
site_url: https://ihavedna.github.io/citadel-wiki/
repo_url: https://github.com/ihavedna/citadel-wiki
repo_name: ihavedna/citadel-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  # Web fonts only — EB Garamond from Google Fonts.
  font:
    text: EB Garamond
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - toc.follow
  # Single warm "parchment" scheme — the wizard.css theme paints the rest.
  palette:
    scheme: default
    primary: brown
    accent: red

extra_css:
  - stylesheets/wizard.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  # Tags listing is placed by the <!-- material/tags --> marker in tags-labels.md
  - tags

nav:
  - The Kallarai Library: index.md
  - About the Library: about.md
  - Original Texts & Primary Sources:
      - original-texts/index.md
      - Current Events: original-texts/current-events.md
      - Historical & Ancient Texts: original-texts/historical-ancient-texts.md
      - Partial & Ciphered Texts: original-texts/partial-ciphered-texts.md
      - Artifacts & Discoveries: original-texts/artifacts-discoveries.md
      - "The Vigil Expedition: Notes and Observations": original-texts/vigil-expedition.md
      - Ademeni's Experiment Notes: original-texts/ademeni-experiment-notes.md
      - "Ritual: Rite of Gathered Malice": original-texts/rite-of-gathered-malice.md
      - Journals & Excerpts from Philemon the Necromancer: original-texts/philemon-journals.md
      - Vampiric Rite to Kahsithiel: original-texts/vampiric-rite-kahsithiel.md
      - "495: Journal Entries from the Swamps beyond Vonor": original-texts/journal-entries-swamps-vonor.md
  - Books & Publications: books-publications.md
  - Journals & Personal Works: journals-personal-works.md
  - Additional References & Documents: additional-references.md
  - Tags & Labels: tags-labels.md
  - "OOG: Templates":
      - oog-templates/index.md
      - TEMPLATE for Original Texts & Primary Sources: oog-templates/template-original-texts.md
      - TEMPLATE for Books & Publications: oog-templates/template-books-publications.md
      - TEMPLATE for Journals & Personal Works: oog-templates/template-journals-personal-works.md
  - Edit navigation: https://github.com/ihavedna/citadel-wiki/edit/main/mkdocs.yml
