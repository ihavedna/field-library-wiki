site_name: Citadel Wiki
site_description: A wiki for the Citadel
site_url: https://ihavedna.github.io/citadel-wiki/
repo_url: https://github.com/ihavedna/citadel-wiki
repo_name: ihavedna/citadel-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  # Self-contained: use the bundled manuscript fonts in wizard.css, no Google Fonts.
  font: false
  features:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - toc.follow
  # Single warm "parchment" scheme — the wizard.css theme paints the rest.
  palette:
    scheme: default
    primary: brown
    accent: red

extra_css:
  - stylesheets/wizard.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - About: about.md
